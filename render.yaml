services:
  - type: web
    name: contact-form-service
    runtime: node
    plan: free
    rootDir: contact-form-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
