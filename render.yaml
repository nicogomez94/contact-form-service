services:
  - type: web
    name: contact-form-service
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        value: default@zigodev.com.ar
      - key: CONTACT_TO_EMAILS_JSON
        value: '{"zigodev.com.ar":"hola@zigodev.com.ar","coordinacionhockey.com.ar":"contacto@coordinacionhockey.com.ar"}'
      - key: CONTACT_FROM_EMAIL
        value: Contacto Zigodev <contacto@zigodev.com.ar>
      - key: ALLOWED_ORIGINS
        value: "https://coordinacionhockey.com.ar,https://www.coordinacionhockey.com.ar,https://zigodev.com.ar,https://www.zigodev.com.ar,https://professionalsathome.com,http://localhost:5173"
