services:
  - type: web
    name: contact-form-service
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        value: hola@zigodev.com.ar
      - key: CONTACT_FROM_EMAIL
        value: Contacto Zigodev <contacto@zigodev.com.ar>
      - key: ALLOWED_ORIGINS
        value: https://zigodev.com.ar,https://www.zigodev.com.ar,http://localhost:5173
