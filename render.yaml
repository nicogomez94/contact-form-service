services:
  - type: web
    name: contact-form-service
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        value: default@zigodev.com.ar
      - key: CONTACT_TO_EMAILS_JSON
        value: '{"zigodev.com.ar":"hola@zigodev.com.ar","coordinacionhockey.com.ar":"contacto@coordinacionhockey.com.ar"}'
      - key: CONTACT_FROM_EMAIL
        value: Contacto Zigodev <contacto@zigodev.com.ar>
      - key: ALLOWED_ORIGINS
        value: "https://coordinacionhockey.com.ar,https://www.coordinacionhockey.com.ar,https://zigodev.com.ar,https://www.zigodev.com.ar,https://professionalsathome.com,http://localhost:5173,https://gonelake.vercel.app,https://inesinasolar.com,https://samaydeco2.com,https://keramik.com.ar,https://nicolasgomezdev.com.ar,https://ggapartments.com.ar,https://blak.com.ar,https://taggeon.vercel.app,https://technosolis.com.ar,https://cetrip.com.ar,https://emilio-frontend-shared-db-zwqe.onrender.com,https://gmcomex.com.ar,https://lauragutierrezpropiedades.com.ar"
